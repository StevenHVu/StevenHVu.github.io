<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Steven & Thu — October 10, 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@200;300;400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--white:#ffffff;--off-white:#f9fbfe;
--sky:#a8cfe8;--sky-light:#daedf8;--sky-pale:#edf6fc;--sky-dark:#5a9ec4;
--pink:#f2b8c6;--pink-light:#fce8ee;--pink-dark:#d47a93;
--charcoal:#2a2a2a;--mid:#666;
--serif:'Playfair Display',Georgia,serif;
--sans:'Nunito',sans-serif;
}

body{font-family:var(--sans);background:#fff;color:#2a2a2a}

/* HERO (unchanged simplified) */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero-names{font-family:var(--serif);font-size:4rem}

/* =========================
   ✨ FIXED CAROUSEL
   ========================= */

#gallery{background:#000}

.carousel {
  position: relative;
  width: 100%;
  height: 520px;
  overflow: hidden;
}

.carousel-track {
  position: relative;
  width: 100%;
  height: 100%;
}

.carousel-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.4s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* active */
.carousel-slide.active {
  opacity: 1;
  z-index: 1;
}

/* image */
.carousel-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 6s ease;
}

.carousel-slide.active img {
  transform: scale(1.08);
}

/* portrait fix */
.carousel-slide.portrait img {
  object-fit: contain;
  z-index: 2;
}

/* blurred bg */
.carousel-slide::before {
  content:'';
  position:absolute;
  inset:0;
  background-image: var(--bg);
  background-size: cover;
  background-position: center;
  filter: blur(35px) scale(1.2);
  opacity:0;
  transition:opacity .5s;
}

.carousel-slide.portrait::before {
  opacity:.6;
}

/* overlay */
.carousel-slide::after{
content:'';
position:absolute;
inset:0;
background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.25));
}

/* buttons */
.carousel-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:44px;height:44px;
border-radius:50%;
border:1px solid rgba(255,255,255,.3);
background:rgba(255,255,255,.15);
color:#fff;
cursor:pointer;
}

.prev{left:20px}
.next{right:20px}

/* dots */
.carousel-dots{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.carousel-dot{
width:7px;height:7px;
border-radius:50%;
background:rgba(255,255,255,.4);
border:none;
cursor:pointer;
}

.carousel-dot.active{
background:#fff;
transform:scale(1.3);
}

</style>
</head>

<body>

<section id="hero">
  <h1 class="hero-names">Steven & Thu</h1>
  <p>October 10, 2026</p>
</section>

<section id="gallery">
  <div class="carousel">

    <div class="carousel-track">

      <div class="carousel-slide active"><img src="image0.jpg"></div>
      <div class="carousel-slide"><img src="image1.jpg"></div>
      <div class="carousel-slide"><img src="image2.jpg"></div>
      <div class="carousel-slide"><img src="image3.jpg"></div>
      <div class="carousel-slide"><img src="image4.jpg"></div>
      <div class="carousel-slide"><img src="image5.jpg"></div>
      <div class="carousel-slide"><img src="image6.jpg"></div>
      <div class="carousel-slide"><img src="image7.jpg"></div>

    </div>

    <button class="carousel-btn prev">&#8592;</button>
    <button class="carousel-btn next">&#8594;</button>

    <div class="carousel-dots" id="dots"></div>

  </div>
</section>

<script>
const slides = document.querySelectorAll('.carousel-slide');
const dotsContainer = document.getElementById('dots');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');

let current = 0;
let timer;

/* setup */
slides.forEach((slide, i) => {

  const img = slide.querySelector('img');
  const src = img.getAttribute('src');

  slide.style.setProperty('--bg', `url(${src})`);

  const dot = document.createElement('button');
  dot.classList.add('carousel-dot');
  if(i===0) dot.classList.add('active');

  dot.onclick = () => {
    goTo(i);
    reset();
  };

  dotsContainer.appendChild(dot);

  const check = () => {
    if(img.naturalHeight > img.naturalWidth){
      slide.classList.add('portrait');
    }
  };

  if(img.complete) check();
  else img.onload = check;
});

const dots = document.querySelectorAll('.carousel-dot');

/* nav */
function goTo(i){
  slides[current].classList.remove('active');
  dots[current].classList.remove('active');

  current = (i + slides.length) % slides.length;

  slides[current].classList.add('active');
  dots[current].classList.add('active');
}

prevBtn.onclick = () => { goTo(current-1); reset(); }
nextBtn.onclick = () => { goTo(current+1); reset(); }

/* autoplay */
function start(){
  timer = setInterval(()=>goTo(current+1),5000);
}

function reset(){
  clearInterval(timer);
  start();
}

start();
</script>

</body>
</html>
